<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ app_name }}</title>
  <style>
    body { font-family: Segoe UI, Arial, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
    .wrap { max-width: 720px; margin: 4rem auto; padding: 1.5rem; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 12px; padding: 1.25rem; }
    h1 { margin-top: 0; }
    code { background: #1f2937; padding: 0.2rem 0.4rem; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>{{ app_name }}</h1>
      <p>Service is online.</p>
      <p>Use <code>/token/{file_id}</code> to create a signed token, then access <code>/stream/{file_id}</code> or <code>/dl/{file_id}</code>.</p>
    </div>
  </div>
</body>
</html>
